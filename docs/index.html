<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SF Rentals</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <div>
      <h1>SF 2-Bedroom Rentals</h1>
      <p id="meta" class="muted">Loading…</p>
    </div>
    <div class="actions">
      <button id="refreshBtn" title="Reload the latest scraped listings">↻ Refresh</button>
    </div>
  </header>

  <section class="filters">
    <input id="search" type="search" placeholder="Search title / neighborhood…" />
    <label>Min $ <input id="minPrice" type="number" min="0" step="100" /></label>
    <label>Max $ <input id="maxPrice" type="number" min="0" step="100" /></label>
    <span id="sourceFilters" class="source-filters"></span>
    <span id="count" class="muted"></span>
  </section>

  <div id="sources" class="sources"></div>
  <div id="status" class="status hidden"></div>

  <table id="table">
    <thead>
      <tr>
        <th data-sort="price">Price</th>
        <th data-sort="beds">Beds</th>
        <th data-sort="sqft">Sqft</th>
        <th data-sort="title">Listing</th>
        <th data-sort="neighborhood">Area</th>
        <th data-sort="source">Source</th>
        <th data-sort="posted_at">Posted</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <footer class="muted">
    Listings are scraped on your phone with the
    <a href="https://github.com/brycejmurrin/apartments/blob/main/scriptable/README.md" target="_blank" rel="noopener">Scriptable app</a>
    and committed to this repo. Tap <strong>↻ Refresh</strong> after a run to
    load the latest.
  </footer>

  <script src="./app.js"></script>
</body>
</html>
