name: crawl

# Runs the rental crawler and commits results to docs/data/listings.json.
# - schedule: automatic refresh every 6 hours
# - workflow_dispatch: the "Run crawler" button on the GitHub Pages site
#   (and the Actions tab) triggers this
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      min_price:
        description: "Minimum monthly rent (optional)"
        required: false
      max_price:
        description: "Maximum monthly rent (optional)"
        required: false

permissions:
  contents: write

concurrency:
  group: crawl-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          MIN_PRICE: ${{ github.event.inputs.min_price }}
          MAX_PRICE: ${{ github.event.inputs.max_price }}
        run: python -m scraper.run

      - name: Commit results
        # Re-sync to the latest remote before each push attempt so concurrent
        # crawls (scheduled + manual) can't fail on a non-fast-forward push.
        # The freshly generated file is preserved across the reset and reapplied,
        # so the most recent crawl always wins.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp docs/data/listings.json "$RUNNER_TEMP/listings.json"
          for attempt in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            cp "$RUNNER_TEMP/listings.json" docs/data/listings.json
            git add docs/data/listings.json
            if git diff --staged --quiet; then
              echo "No changes to listings."
              break
            fi
            git commit -m "data: refresh listings ($(date -u +%Y-%m-%dT%H:%MZ))"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt $attempt."
              break
            fi
            echo "Push rejected (attempt $attempt); re-syncing and retrying."
            sleep $((attempt * 2))
          done
